<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solaris - Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-bg">

    <div class="login-container glass-panel">
        <div style="position: absolute; top: 1rem; right: 1rem;">
            <button class="theme-toggle" id="themeToggleLogin" title="Alternar Tema Escuro/Claro">
                <i class="ph ph-moon"></i>
            </button>
        </div>
        <div class="login-header">
            <i class="ph-fill ph-sun logo-icon"></i>
            <h1 style="color: var(--primary-color);">Solaris</h1>
            <p style="color: var(--text-light);">Gestão Inteligente de Projetos Solares</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <input type="email" id="email" placeholder="nome@solaris.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                Entrar no Sistema
            </button>
        </form>

        <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; text-align: center;">
            <p style="color: var(--text-light); font-size: 0.875rem; margin-bottom: 1rem;">Acesso Rápido Simulado (Mock)</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                <button class="btn" style="background: var(--hover-bg); color: var(--text-main); font-size: 0.8rem; padding: 0.5rem;" onclick="mockLogin('admin')">Admin</button>
                <button class="btn" style="background: var(--hover-bg); color: var(--text-main); font-size: 0.8rem; padding: 0.5rem;" onclick="mockLogin('comercial')">Comercial</button>
                <button class="btn" style="background: var(--hover-bg); color: var(--text-main); font-size: 0.8rem; padding: 0.5rem;" onclick="mockLogin('engenharia')">Engenharia</button>
                <button class="btn" style="background: var(--hover-bg); color: var(--text-main); font-size: 0.8rem; padding: 0.5rem;" onclick="mockLogin('cliente')">Cliente</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/supabaseClient.js"></script>
    <script src="assets/js/authSetup.js"></script>
    <script>
        // Form Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Call auth function
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Autenticando...';
            btn.disabled = true;
            
            await login(email, password);
            
            btn.innerText = originalText;
            btn.disabled = false;
        });

        // Mock Login functionality
        function mockLogin(role) {
            // Bypass Supabase entirely and just redirect based on role
            // We set a fake sessionStorage item so the dashboard doesn't kick them out if we added client-side protection
            sessionStorage.setItem('mockRole', role);
            window.location.href = `pages/dashboard-${role}.html`;
        }
        
        // Theme Toggle Logic
        const toggleBtn = document.getElementById('themeToggleLogin');
        const icon = toggleBtn.querySelector('i');
        
        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                icon.classList.replace('ph-moon', 'ph-sun');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                icon.classList.replace('ph-sun', 'ph-moon');
            }
        });
    </script>
</body>
</html>
